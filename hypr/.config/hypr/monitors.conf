# See https://wiki.hyprland.org/Configuring/Monitors/

# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2


# ---------------------------------------------------------------------------------------

# ============================================================================
# SINGLE SOURCE OF TRUTH
# Define each monitor I own once. Change ports here if they swap or break.
# Add new monitors below by following the same pattern.
# ============================================================================

# --- HOME Dell (Dell S2722QC, 27" 4K UHD) ---
$dellHomePort  = DP-2
$dellHomeRes   = 3840x2160@60
$dellHomeScale = 1.5

# --- WORK Dell (Dell S2725QC, 4K UHD) ---
$dellWorkPort  = DP-1
$dellWorkRes   = 3840x2160@60
$dellWorkScale = 1.5

# --- TUXEDO laptop internal ---
$laptop      = eDP-1
$laptopRes   = 2880x1800@120
$laptopScale = 1.8

# --- Layout positions ---
$posExtTopLeft    = 0x0           # external at origin
$posHomeLaptop    = 480x1440      # laptop BELOW external (home stack)
$posOfficeLaptop  = 2560x220      # laptop RIGHT of external (office)
$posStandaloneLaptop = 0x0        # laptop standalone
$posHdmiLaptop    = 1920x0        # laptop right of HDMI (extended)

# --- ACTIVE external (used by workspace assignment below) ---
# Set this to whichever Dell is currently plugged in.
# Change to $dellWorkPort value (e.g. DP-1, HDMI-A-1) when at the office.
$externalMonitor = DP-2


# Monitor and Screen resolution --TUXEDO

# Desc for 4: For example, if you have a 27" or 32" 4K, you can use fractional scaling (env = GDK_SCALE,1.75 and monitor=,preferred,auto,1.66666)
# Fallback: Use single default monitor (see all monitors with: hyprctl monitors)
# for 4k (but works also for leneovo native). Optimal for lenovo would be scale=1
# monitor=,preferred,auto,1.666667
env = GDK_SCALE,1.75 #for 4k

# ===== STATIC MONITOR DEFINITIONS =====
# These apply when Hyprland starts

# # External Dell 4K monitor (works for both home and office)
# monitor = $dellHomePort, $dellHomeRes, $posExtTopLeft, $dellHomeScale

# # TUXEDO laptop internal screen (default) - append mirror for demo-presentations
# monitor = $laptop, $laptopRes, $posHomeLaptop, $laptopScale #, mirror, $dellHomePort

# MIRROR for PRESENTATIONs -> Comment out above and use below -> Or just append `mirror,DP-1` or `mirror,HDMI-A-1` to above. Check with `hyprctl monitors`
##-1 DisplayPort:
#monitor = $laptop, $laptopRes, 0x0, $laptopScale, mirror, $dellHomePort
##-2 HDMI:
#monitor = $laptop, $laptopRes, 0x0, $laptopScale, mirror, $hdmi
#monitor = eDP-1, 2880x1800@120, 0x0, 1.8, mirror, HDMI-1

# Fallback for any other monitors
monitor = , preferred, auto, auto

## Manual TOOL Setup, use `hyprmon` to setup screen


# ===== DYNAMIC LAYOUT SWITCHING =====
# Only the POSITION changes between home and office

# SUPER ALT 7: HOME setup (external above, laptop below) -- Toggle to HOME setup
# bindd = SUPER ALT, 7, Home Setup, exec, hyprctl keyword monitor "DP-1,3840x2160@60,0x0,1.5" && hyprctl keyword monitor "eDP-1,2880x1800@120,480x1440,1.8" && notify-send "Monitor Setup" "HOME: External above laptop"
bindd = SUPER ALT, 7, Home Setup, exec, hyprctl keyword monitor "$dellHomePort,$dellHomeRes,$posExtTopLeft,$dellHomeScale" && hyprctl keyword monitor "$laptop,$laptopRes,$posHomeLaptop,$laptopScale" && notify-send "Monitor Setup" "HOME: External above laptop"
# bindd = SUPER ALT, 1, Home Setup, exec, hyprctl keyword monitor "DP-1,3840x2160@60,0x0,1.5" && hyprctl keyword monitor "eDP-1,disable" && notify-send "Monitor Setup" "HOME: External only"
bindd = SUPER ALT, 1, Home Setup, exec, hyprctl keyword monitor "$dellHomePort,$dellHomeRes,$posExtTopLeft,$dellHomeScale" && hyprctl keyword monitor "$laptop,disable" && notify-send "Monitor Setup" "HOME: External only"


# SUPER ALT 8: OFFICE setup (external left, laptop right) -- Toggle to OFFICE setup
bindd = SUPER ALT, 8, Office Setup, exec, hyprctl keyword monitor "$dellWorkPort,$dellWorkRes,$posExtTopLeft,$dellWorkScale" && hyprctl keyword monitor "$laptop,$laptopRes,$posOfficeLaptop,$laptopScale" && notify-send "Monitor Setup" "OFFICE: Laptop right of external"
bindd = SUPER ALT, 2, Office Setup, exec, hyprctl keyword monitor "$dellWorkPort,$dellWorkRes,$posExtTopLeft,$dellWorkScale" && hyprctl keyword monitor "$laptop,disable" && notify-send "Monitor Setup" "OFFICE: External only"


# SUPER ALT 9: Laptop only (disable both externals)
bindd = SUPER ALT, 9, Laptop Only, exec, hyprctl keyword monitor "$dellHomePort,disable" && hyprctl keyword monitor "$dellWorkPort,disable" && hyprctl keyword monitor "$laptop,$laptopRes,$posStandaloneLaptop,$laptopScale" && notify-send "Monitor Setup" "Laptop only mode"

# SUPER ALT 0: Auto setup (reset to defaults)
bindd = SUPER ALT, 0, Auto Setup, exec, hyprctl keyword monitor ",preferred,auto,auto" && notify-send "Monitor Setup" "AUTO setup"

# ===== HDMI SHORTCUTS =====
# TODO: Check when connected it shows up as HDMI-A-1 or HDMI-1
# SUPER ALT 4: Mirror internal laptop to HDMI (for presentations)
bindd = SUPER ALT, 4, HDMI Mirror, exec, hyprctl keyword monitor "$HDMI-A-1,preferred,auto,auto" && hyprctl keyword monitor "$laptop,$laptopRes,0x0,$laptopScale,mirror,$hdmi" && notify-send "Monitor Setup" "HDMI: Mirrored display"

# SUPER ALT 5: Extended display with HDMI (laptop + HDMI side by side)
bindd = SUPER ALT, 5, HDMI Extended, exec, hyprctl keyword monitor "$HDMI-A-1,preferred,0x0,auto" && hyprctl keyword monitor "$laptop,$laptopRes,$posHdmiLaptop,$laptopScale" && notify-send "Monitor Setup" "HDMI: Extended display"


# Cycle monitor scaling with SUPER + CTRL + / (slash)
bindd = SUPER CTRL, slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
bindd = SUPER CTRL ALT, slash, Cycle monitor scaling backwards, exec, omarchy-hyprland-monitor-scaling-cycle --reverse

## Scaling on dell home setup - Scaling comparison:
## - **1.0 (Native)**: 3840×2160 - Too small, text would be unreadable
## - **1.5 (seem best)**: 2560×1440 effective - Perfect balance ✅
## - **2.0**: 1920×1080 effective - Too large, wastes the 4K resolution

# ===== WORKSPACE ASSIGNMENT =====
# Workspaces 1-5 on external monitor (currently $dell — change at top to switch location)
workspace = 1, monitor:$externalMonitor
workspace = 2, monitor:$externalMonitor
workspace = 3, monitor:$externalMonitor
workspace = 4, monitor:$externalMonitor
workspace = 5, monitor:$externalMonitor

# Workspaces 6-10 on laptop screen (eDP-1)
workspace = 6, monitor:$laptop
workspace = 7, monitor:$laptop
workspace = 8, monitor:$laptop
workspace = 9, monitor:$laptop
workspace = 10, monitor:$laptop

# Fallback: when no external monitor, all workspaces on laptop
workspace = 1, monitor:$laptop, default:true
workspace = 2, monitor:$laptop, default:true
workspace = 3, monitor:$laptop, default:true
workspace = 4, monitor:$laptop, default:true
workspace = 5, monitor:$laptop, default:true


# Cycle monitor scaling
bindd = SUPER ALT CTRL, Slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle

