[[senders]]
  name = "Simon Späti" #alias for s with simu
  from = "Simon Späti <s@ssp.sh>"
  account = "Personal"

[screener]
  screened_in = "/home/sspaeti/.dotfiles/mutt/.lists/screened_in.txt"
  screened_out = "/home/sspaeti/.dotfiles/mutt/.lists/screened_out.txt"
  feed = "/home/sspaeti/.dotfiles/mutt/.lists/feed.txt"
  papertrail = "/home/sspaeti/.dotfiles/mutt/.lists/papertrail.txt"
  spam = "/home/sspaeti/.dotfiles/mutt/.lists/spam.txt"

[folders]
  inbox = "INBOX"
  sent = "Sent"
  trash = "Trash"
  drafts = "Drafts"
  to_screen = "ToScreen"
  feed = "Feed"
  papertrail = "PaperTrail"
  screened_out = "ScreenedOut"
  archive = "Archive"
  work = "Work"
  waiting = "Waiting"
  scheduled = "Scheduled"
  someday = "Someday"
  spam = "spam"
  tab_order = ["inbox", "to_screen", "feed", "papertrail", "waiting", "someday", "scheduled", "sent", "work", "archive", "screened_out", "trash"]

[ui]
  theme = "dark"
  inbox_count = 200

